

---
name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voicecapture-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
---

Build dauert ca. 8-10 Minuten. APK liegt dann unter Actions → letzter Run → Artifacts.
