name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/vc.jks
        shell: bash

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          AGENT_INTERNAL_TOKEN: ${{ secrets.AGENT_INTERNAL_TOKEN }}
          KEYSTORE_PATH: /tmp/vc.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run transcription integration test
        run: gradle :app:testDebugUnitTest --tests "com.s3id3l.voicecapture.TranscriptionIntegrationTest" --info
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          AGENT_INTERNAL_TOKEN: ${{ secrets.AGENT_INTERNAL_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voicecapture-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
