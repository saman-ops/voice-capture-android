name: Build & Test

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/vc.jks
        shell: bash

      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          AGENT_INTERNAL_TOKEN: ${{ secrets.AGENT_INTERNAL_TOKEN }}
          KEYSTORE_PATH: /tmp/vc.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Run all unit tests (UC-1 through UC-8)
        run: gradle :app:testDebugUnitTest --info
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          AGENT_INTERNAL_TOKEN: ${{ secrets.AGENT_INTERNAL_TOKEN }}

      - name: Run transcription integration test
        run: gradle :app:testDebugUnitTest --tests "com.s3id3l.voicecapture.TranscriptionIntegrationTest" --info
        env:
          DEFAULT_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_KEY }}
          DEFAULT_GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          AGENT_INTERNAL_TOKEN: ${{ secrets.AGENT_INTERNAL_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voicecapture-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Send APK to Telegram (manual builds)
        if: github.event_name == 'workflow_dispatch'
        env:
          # Passed via env (never inline ${{ }} in run:) to avoid injection.
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: "621597017"
          BUILD_NUM: ${{ github.run_number }}
          BRANCH: ${{ github.ref_name }}
          APK_PATH: app/build/outputs/apk/debug/app-debug.apk
        run: |
          set -euo pipefail

          if [ -z "${TG_TOKEN:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is not set — cannot send APK."
            exit 1
          fi
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK not found at $APK_PATH"
            exit 1
          fi

          CAPTION="$(printf '📦 VoiceCapture Debug-APK\nBuild %s · Branch %s' "$BUILD_NUM" "$BRANCH")"

          # Send the APK as a document; retry up to 3x and verify {"ok":true}.
          ok="false"
          for attempt in 1 2 3; do
            RESP="$(curl -sS -m 180 -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendDocument" \
              -F chat_id="${TG_CHAT_ID}" \
              -F caption="${CAPTION}" \
              -F document=@"${APK_PATH}" || true)"
            echo "Attempt ${attempt} response: $(printf '%s' "$RESP" | head -c 300)"
            if printf '%s' "$RESP" | jq -e '.ok == true' >/dev/null 2>&1; then
              ok="true"
              break
            fi
            sleep $((attempt * 3))
          done

          if [ "$ok" != "true" ]; then
            echo "::error::Telegram sendDocument failed after 3 attempts (see responses above)."
            exit 1
          fi
          echo "APK sent to Telegram chat ${TG_CHAT_ID}."

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: voicecapture-debug-${{ github.run_number }}
          path: ./apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "VoiceCapture Build #${{ github.run_number }}"
          body: |
            Automatischer Build von `main`.

            **Commit:** ${{ github.event.head_commit.message }}
            **SHA:** ${{ github.sha }}
          files: ./apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Telegram
        env:
          # Values passed via env (never inline ${{ }} in run:) to prevent
          # shell/command injection through a crafted commit message.
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: "621597017"
          BUILD_NUM: ${{ github.run_number }}
          COMMIT_MSG_RAW: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if [ -z "${TG_TOKEN:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is not set — cannot notify."
            exit 1
          fi

          APK_URL="https://github.com/saman-ops/voice-capture-android/releases/tag/build-${BUILD_NUM}"
          COMMIT_FIRST_LINE="$(printf '%s' "$COMMIT_MSG_RAW" | head -n1)"
          TEXT="$(printf '✅ VoiceCapture Build %s freigegeben\n\n📦 APK: %s\n\n%s' \
            "$BUILD_NUM" "$APK_URL" "$COMMIT_FIRST_LINE")"

          # Build the JSON body with jq so quotes/newlines/emoji are safely escaped.
          PAYLOAD="$(jq -nc \
            --arg chat_id "$TG_CHAT_ID" \
            --arg text "$TEXT" \
            '{chat_id: $chat_id, text: $text, disable_web_page_preview: false}')"

          # Retry up to 3x; verify Telegram's {"ok":true} so failures are LOUD
          # instead of silently passing the step.
          ok="false"
          for attempt in 1 2 3; do
            RESP="$(curl -sS -m 30 -X POST \
              "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" || true)"
            echo "Attempt ${attempt} response: ${RESP}"
            if printf '%s' "$RESP" | jq -e '.ok == true' >/dev/null 2>&1; then
              ok="true"
              break
            fi
            sleep $((attempt * 3))
          done

          if [ "$ok" != "true" ]; then
            echo "::error::Telegram notification failed after 3 attempts (see responses above)."
            exit 1
          fi
          echo "Telegram notification delivered."
